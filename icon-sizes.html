<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>CountAble icon — size test</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,sans-serif; }
  .half { padding:36px 20px; text-align:center; }
  .dark { background:linear-gradient(160deg,#1a2337,#0d1017); color:#eee; }
  .light { background:linear-gradient(160deg,#dfe6f2,#f6efe4); color:#222; }
  h2 { font-size:14px; letter-spacing:.1em; margin-bottom:20px; opacity:.7; }
  .row { display:flex; gap:36px; justify-content:center; align-items:flex-end; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .cell img { border-radius:22.4%; box-shadow:0 4px 14px rgba(0,0,0,.35); }
  .cell span { font-size:11px; opacity:.65; }
  .label { font-size:10px; margin-top:5px; }
</style>
</head>
<body>
  <div class="half dark">
    <h2>DARK HOME SCREEN</h2>
    <div class="row">
      <div class="cell"><img src="icon-test.png" width="180" height="180"/><span>App Store</span></div>
      <div class="cell"><img src="icon-test.png" width="120" height="120"/><span>iPad</span></div>
      <div class="cell"><img src="icon-test.png" width="60" height="60"/><div class="label">CountAble</div><span>Home screen</span></div>
      <div class="cell"><img src="icon-test.png" width="40" height="40"/><span>Spotlight</span></div>
      <div class="cell"><img src="icon-test.png" width="29" height="29"/><span>Settings</span></div>
    </div>
  </div>
  <div class="half light">
    <h2>LIGHT HOME SCREEN</h2>
    <div class="row">
      <div class="cell"><img src="icon-test.png" width="180" height="180"/><span>App Store</span></div>
      <div class="cell"><img src="icon-test.png" width="120" height="120"/><span>iPad</span></div>
      <div class="cell"><img src="icon-test.png" width="60" height="60"/><div class="label">CountAble</div><span>Home screen</span></div>
      <div class="cell"><img src="icon-test.png" width="40" height="40"/><span>Spotlight</span></div>
      <div class="cell"><img src="icon-test.png" width="29" height="29"/><span>Settings</span></div>
    </div>
  </div>
</body>
</html>
